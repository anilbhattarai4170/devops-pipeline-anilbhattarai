name: Full DevOps Pipeline - Student 2

on:
  push:
    branches:
      - main

jobs:

  docker_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t anilbhattarai_app .

      - name: Tag Docker Image
        run: docker tag anilbhattarai_app:latest ${{ secrets.DOCKER_USERNAME }}/anilbhattarai_app:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/anilbhattarai_app:latest


  deploy:
    runs-on: ubuntu-latest
    needs: docker_build

    steps:
      - name: Deploy to AWS EC2
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_PUBLIC_IP }}
          USER: "ubuntu"
        run: |
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          ssh -o StrictHostKeyChecking=no -i private_key.pem $USER@$HOST << EOF
            docker pull ${{ secrets.DOCKER_USERNAME }}/anilbhattarai_app:latest
            docker stop my-app || true
            docker rm my-app || true
            docker run -d -p 5001:5000 --name my-app ${{ secrets.DOCKER_USERNAME }}/anilbhattarai_app:latest
          EOF
